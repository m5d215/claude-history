name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Create Claude projects directory
        run: mkdir -p ~/.claude/projects

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release
